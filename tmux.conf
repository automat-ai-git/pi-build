# 256 цветов
set -g default-terminal "tmux-256color"

# Расширенные клавиши для ttyd/браузера (требует tmux 3.5+)
set -g extended-keys on
set -g extended-keys-format csi-u

# Побольше истории
set -g history-limit 50000

# Мышь включена для скролла колёсиком
set -g mouse on

# ── Буфер обмена (OSC52 → браузер) ──────────────────────
# Сообщить tmux, что внешний терминал (ttyd/xterm-256color) поддерживает clipboard
set -as terminal-features ',xterm-256color:clipboard'
set -s set-clipboard on
set -g allow-passthrough on

# vi-режим в copy-mode
setw -g mode-keys vi

# При выделении мышью → скопировать через OSC52 в буфер обмена браузера
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel '/usr/local/bin/yank > #{pane_tty}'
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel '/usr/local/bin/yank > #{pane_tty}'

# Нумерация окон с 1
set -g base-index 1
setw -g pane-base-index 1

# Статус-бар: понятно где мы
set -g status-style "bg=colour235,fg=colour248"
set -g status-left " π #S "
set -g status-right " #H | %H:%M "

# Автоматически перенумеровывать окна при закрытии
set -g renumber-windows on
